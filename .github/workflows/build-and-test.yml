name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Display .NET version
      run: dotnet --version

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger trx --results-directory ./TestResults

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always() && !env.ACT
      with:
        name: test-results
        path: ./TestResults/*.trx

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: success() && !env.ACT
      with:
        files: '**/coverage.cobertura.xml'
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Publish build artifacts
      uses: actions/upload-artifact@v4
      if: success() && !env.ACT
      with:
        name: build-artifacts
        path: |
          **/bin/Release/**
          !**/bin/Release/**/ref/**
          !**/bin/Release/**/*.pdb

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build CLI
      run: dotnet build src/CostEstimationCli/CostEstimationCli.csproj --configuration Release

    - name: Run CLI (dry run)
      working-directory: src/CostEstimationCli
      run: dotnet run --budget 500 --configuration Release
      continue-on-error: true
      env:
        DOTNET_ENVIRONMENT: Production
        CLOUDCOSTIFY_BASE_URL: ${{ secrets.CLOUDCOSTIFY_BASE_URL || 'https://api.cloudcostify.io/api/cost-estimates' }}
        CLOUDCOSTIFY_API_KEY: ${{ secrets.CLOUDCOSTIFY_API_KEY }}
        CLOUDCOSTIFY_PULUMI_PROJECT_STACK_NAME: ${{ secrets.CLOUDCOSTIFY_PULUMI_PROJECT_STACK_NAME }}
        CLOUDCOSTIFY_PULUMI_PROJECT_DIRECTORY_PATH: ${{ secrets.CLOUDCOSTIFY_PULUMI_PROJECT_DIRECTORY_PATH }}
        PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        PulumiProjectName: ${{ secrets.PULUMI_PROJECT_NAME }}
